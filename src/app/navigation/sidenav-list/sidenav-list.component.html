<mat-nav-list>
  <a mat-list-item routerLink="/" (click)="onCloseSidenav()">
    <mat-icon>home</mat-icon>
    <span class="nav-caption">Home</span>
  </a>
  <mat-divider></mat-divider>
  <ng-container *ngIf="authStatus; else guest">
    <a mat-list-item routerLink="/training" (click)="onCloseSidenav()">
      <mat-icon>fitness_center</mat-icon>
      <span class="nav-caption">Training</span>
    </a>
    <mat-divider></mat-divider>
    <mat-list-item>
      <button mat-icon-button (click)="onCloseSidenav()">
        <mat-icon>logout</mat-icon>
        <span class="nav-caption">Logout</span>
      </button>
    </mat-list-item>
  </ng-container>
  <ng-template #guest>
    <a mat-list-item routerLink="/register" (click)="onCloseSidenav()">
      <mat-icon>account_circle</mat-icon>
      <span class="nav-caption">Register</span>
    </a>
    <a mat-list-item routerLink="/login" (click)="onCloseSidenav()">
      <mat-icon>login</mat-icon>
      <span class="nav-caption">Login</span>
    </a>
  </ng-template>
</mat-nav-list>
